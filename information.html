<!DOCTYPE html>
<html>
<head>
  <title>Information</title>
  <style>
    html, body {
      margin: 0;
      background: white;
      font-family: Arial;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .site-title {
      position: fixed;
      top: 30px;
      left: 30px;
      font-size: 26px;
      line-height: 1.4;
      cursor: pointer;
      z-index: 10;
    }

    .site-title span {
      display: inline-block;
      position: relative;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
    }

    .site-title span::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: black;
    }

    .mode {
      position: fixed;
      top: 30px;
      right: 30px;
      font-size: 22px;
      color: black;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -370px;
      width: 370px;
      height: 100vh;
      background: black;
      color: white;
      padding: 35px 30px;
      box-sizing: border-box;
      z-index: 50;
      transition: left 0.3s;
    }

    .menu-title {
      font-size: 26px;
      line-height: 1.4;
      cursor: pointer;
    }

    .menu-title span {
      display: inline-block;
      position: relative;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
    }

    .menu-title span::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: white;
    }

    .menu-item {
      margin-top: 60px;
      font-size: 18px;
      color: white;
      text-decoration: none;
      display: block;
    }

    .info-wrap {
      position: relative;
      width: 380px;
      height: 520px;
    }

    .back-box {
      position: absolute;
      width: 380px;
      height: 520px;
      background: #9b9b9b;
      left: 14px;
      top: 14px;
    }

    .info-box {
      position: absolute;
      width: 380px;
      height: 520px;
      background: #d3d3d3;
      padding: 25px 30px;
      box-sizing: border-box;
    }

    .info-title {
      font-size: 24px;
      margin-bottom: 18px;
    }

    .line {
      width: 100%;
      height: 1px;
      background: black;
      margin-bottom: 30px;
    }

    .field {
      font-size: 14px;
      margin-bottom: 22px;
    }

    .notes {
      margin-top: 40px;
      font-size: 14px;
    }

    .bottom-line {
      position: absolute;
      left: 30px;
      right: 30px;
      bottom: 80px;
      height: 1px;
      background: black;
    }

    .submit {
      position: absolute;
      left: 30px;
      bottom: 35px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>

<body onclick="closeMenu()">

  <div class="site-title" onclick="toggleMenu(event)">
    <span>PARSONS SURVIVAL</span><br>
    <span>NETWORK</span>
  </div>

  <div class="mode">offering</div>

  <div class="sidebar" id="sidebar" onclick="event.stopPropagation()">
    <div class="menu-title" onclick="toggleMenu(event)">
      <span>PARSONS SURVIVAL</span><br>
      <span>NETWORK</span>
    </div>
    <a href="create.html" class="menu-item">create a post</a>
  </div>

  <div class="info-wrap">
    <div class="back-box"></div>

    <div class="info-box">
      <div class="info-title">Leave your information</div>
      <div class="line"></div>

      <div class="field">Name:</div>
      <div class="field">Contact:</div>
      <div class="field">Current location:</div>
      <div class="field">Available Time:</div>

      <div class="notes">Notes:</div>

      <div class="bottom-line"></div>
      <div class="submit">[Submit]</div>
    </div>
  </div>

  <script>
    function toggleMenu(event) {
      event.stopPropagation();
      let sidebar = document.getElementById("sidebar");
      if (sidebar.style.left === "0px") {
        sidebar.style.left = "-370px";
      } else {
        sidebar.style.left = "0px";
      }
    }

    function closeMenu() {
      document.getElementById("sidebar").style.left = "-370px";
    }
  </script>

</body>
</html>
