<!DOCTYPE html>
<html>
<head>
  <title>Post</title>

  <style>
    html, body {
      margin: 0;
      background: white;
      font-family: Arial;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .site-title {
      position: fixed;
      top: 30px;
      left: 30px;
      font-size: 26px;
      line-height: 1.4;
      cursor: pointer;
      z-index: 10;
    }

    .site-title span {
      display: inline-block;
      position: relative;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
    }

    .site-title span::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: black;
    }

    .mode {
      position: fixed;
      top: 30px;
      right: 30px;
      font-size: 22px;
      color: black;
      cursor: default;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -370px;
      width: 370px;
      height: 100vh;
      background: black;
      color: white;
      padding: 35px 30px;
      box-sizing: border-box;
      z-index: 50;
      transition: left 0.3s;
    }

    .menu-title {
      font-size: 26px;
      line-height: 1.4;
      cursor: pointer;
    }

    .menu-title span {
      display: inline-block;
      position: relative;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
    }

    .menu-title span::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: white;
    }

    .menu-item {
      margin-top: 60px;
      font-size: 18px;
      color: white;
      text-decoration: none;
      display: block;
    }
    
    .center-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .post-wrap {
      position: relative;
      width: 380px;
      height: 520px;
    }

    .back-box {
      position: absolute;
      width: 380px;
      height: 520px;
      background: #9b9b9b;
      left: 14px;
      top: 14px;
    }

    .post {
      position: absolute;
      width: 380px;
      height: 520px;
      background: #d3d3d3;
      padding: 25px 30px;
      box-sizing: border-box;
    }

    .post-title {
      font-size: 24px;
      margin-bottom: 25px;
    }

    .small-info {
      font-size: 14px;
      margin-bottom: 25px;
    }

    .description {
      font-size: 14px;
      margin-bottom: 15px;
    }

    .image-box {
      width: 100%;
      height: 140px;
      background: #aaa;
      overflow: hidden;
      margin-top: 10px;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .tags {
      position: absolute;
      left: 30px;
      bottom: 25px;
      font-size: 14px;
    }

    .tags span {
      margin-right: 16px;
    }

    .home-btn {
      cursor: pointer;
    }
  </style>
</head>

<body onclick="closeMenu()">

  <div class="site-title" onclick="toggleMenu(event)">
    <span>PARSONS SURVIVAL</span><br>
    <span>NETWORK</span>
  </div>

  <div class="mode">offering</div>

  <div class="sidebar" id="sidebar" onclick="event.stopPropagation()">
    <div class="menu-title" onclick="toggleMenu(event)">
      <span>PARSONS SURVIVAL</span><br>
      <span>NETWORK</span>
    </div>

    <a href="create.html" class="menu-item">create a post</a>
  </div>

  <div class="center-wrap">
    <div class="post-wrap">
      <div class="back-box"></div>

      <div class="post">
        <div class="post-title" id="postTitle"></div>

        <div class="small-info">
          <div id="urgency"></div>
          <div id="location"></div>
          <div id="time"></div>
        </div>

        <div class="description" id="description"></div>

        <div class="image-box">
          <img id="postImage">
        </div>

        <div class="tags">
          <span class="available-btn" onclick="location.href='information.html'">[Available]</span>
          <span class="home-btn" onclick="location.href='index.html'">[Home]</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function toggleMenu(event) {
      event.stopPropagation();
      let sidebar = document.getElementById("sidebar");

      if (sidebar.style.left === "0px") {
        sidebar.style.left = "-370px";
      } else {
        sidebar.style.left = "0px";
      }
    }

    function closeMenu() {
      document.getElementById("sidebar").style.left = "-370px";
    }

    let post = JSON.parse(localStorage.getItem("selectedPost"));

    if (post) {
      let parts = (post.title || "").split("/");

      document.getElementById("postTitle").textContent = parts[1]?.trim() || "";
      document.getElementById("urgency").textContent = parts[0]?.trim() || "";
      document.getElementById("location").textContent = parts[2]?.trim() || "";
      document.getElementById("time").textContent = parts[3]?.trim() || "";
      document.getElementById("description").textContent = parts[4]?.trim() || "";

      let imageURL =
        post.image?.display?.url ||
        post.image?.large?.url ||
        post.image?.original?.url ||
        post.image?.thumb?.url;

      if (imageURL) {
        document.getElementById("postImage").src = imageURL;
      }
    }
  </script>

</body>
</html>
