<!DOCTYPE html>
<html>
<head>
  <title>Parsons Survival Network</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: white;
      font-family: Arial;
    }

    .title {
      position: fixed;
      top: 30px;
      left: 30px;
      font-size: 26px;
      line-height: 1.4;
      z-index: 10;
      cursor: pointer;
    }

    /* double underline */
    .title span {
      display: inline-block;
      position: relative;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
    }

    .title span::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: black;
    }

    /* 🔥 offering 정렬 + 크기 */
    .mode {
      position: fixed;
      top: 30px;        /* title이랑 맞춤 */
      right: 30px;
      font-size: 18px;  /* 작게 */
      text-decoration: none;
      color: black;
      z-index: 10;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -370px;
      width: 370px;
      height: 100vh;
      background: black;
      color: white;
      padding: 35px 30px;
      box-sizing: border-box;
      z-index: 50;
      transition: left 0.3s ease;
    }

    .sidebar.open {
      left: 0;
    }

    .menu-title {
      font-size: 26px;
      line-height: 1.4;
    }

    .menu-title span {
      display: inline-block;
      position: relative;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
    }

    .menu-title span::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: white;
    }

    .menu-item {
      margin-top: 80px;
      font-size: 18px;  /* 🔥 create a post 작게 */
      color: white;
      text-decoration: none;
      display: block;
    }

    .window {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      border: 2px solid black;
      position: relative;
    }

    .page {
      position: absolute;
      width: 12000px;
      height: 9000px;
      transform-origin: 50vw 50vh;
      transition: transform 0.12s ease-out;
    }

    .bubble {
      position: absolute;
      background: #d3d3d3;
      border-radius: 50%;
      transition: background 0.2s ease;
    }

    .bubble:hover {
      background: #eeeeee;
    }

    .photo {
      position: absolute;
      width: 80%;
      height: 65%;
      left: 10%;
      top: 10%;
      border-radius: 50%;
      overflow: hidden;
      background: #aaa;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info {
      position: absolute;
      width: 100%;
      bottom: 14%;
      text-align: center;
      font-size: 15px;
      transform: rotate(15deg);
    }
  </style>
</head>

<body>

<div class="title" onclick="toggleMenu()">
  <span>PARSONS SURVIVAL</span><br>
  <span>NETWORK</span>
</div>

<div class="sidebar" id="sidebar">
  <div class="menu-title">
    <span>PARSONS SURVIVAL</span><br>
    <span>NETWORK</span>
  </div>

  <a href="create.html" class="menu-item">create a post</a>
</div>

<a href="index2.html" class="mode">offering</a>

<div class="window" id="window">
  <div class="page" id="page"></div>
</div>

<script>
const arenaData = "https://api.are.na/v2/channels/publication-btmpbivan1o/contents?per=50";

let items = [];
let placed = [];

let sizes = [
  { w: 160, h: 120 },
  { w: 300, h: 220 },
  { w: 480, h: 340 }
];

let moveX = -4500;
let moveY = -3200;
let scale = 1;

const page = document.getElementById("page");
const win = document.getElementById("window");

function toggleMenu() {
  const sidebar = document.getElementById("sidebar");
  sidebar.classList.toggle("open");
}

function applyTransform() {
  page.style.transform =
    "translate(" + moveX + "px, " + moveY + "px) scale(" + scale + ")";
}

async function loadData() {
  try {
    const res = await fetch(arenaData);
    const data = await res.json();
    items = data.contents;
  } catch {
    items = [];
  }

  for (let i = 0; i < 18; i++) {
    makeBubble(0, 0);
  }
}

function makeBubble(directionX, directionY) {
  if (items.length === 0) return;

  let block = items[Math.floor(Math.random() * items.length)];

  let imageURL =
    block.image?.display?.url ||
    block.image?.large?.url ||
    block.image?.original?.url ||
    block.image?.thumb?.url;

  if (!imageURL) return;

  let size = sizes[Math.floor(Math.random() * sizes.length)];
  let w = size.w;
  let h = size.h;

  let viewX = -moveX + window.innerWidth / 2;
  let viewY = -moveY + window.innerHeight / 2;

  let x, y, ok = false;

  for (let tries = 0; tries < 300; tries++) {

    if (directionX > 0) {
      x = viewX + 700 + Math.random() * 1200;
    } else if (directionX < 0) {
      x = viewX - 1900 + Math.random() * 1200;
    } else {
      x = viewX - 900 + Math.random() * 1800;
    }

    if (directionY > 0) {
      y = viewY + 500 + Math.random() * 1000;
    } else if (directionY < 0) {
      y = viewY - 1500 + Math.random() * 1000;
    } else {
      y = viewY - 700 + Math.random() * 1400;
    }

    ok = true;

    for (let i = 0; i < placed.length; i++) {
      let b = placed[i];
      let gap = 50;

      if (
        x < b.x + b.w + gap &&
        x + w + gap > b.x &&
        y < b.y + b.h + gap &&
        y + h + gap > b.y
      ) {
        ok = false;
        break;
      }
    }

    if (ok) break;
  }

  if (!ok) return;

  let bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.style.width = w + "px";
  bubble.style.height = h + "px";
  bubble.style.left = x + "px";
  bubble.style.top = y + "px";

  let photo = document.createElement("div");
  photo.className = "photo";

  let img = document.createElement("img");
  img.src = imageURL;

  let info = document.createElement("div");
  info.className = "info";
  info.innerText = "title / urgency level";

  photo.appendChild(img);
  bubble.appendChild(photo);
  bubble.appendChild(info);
  page.appendChild(bubble);

  placed.push({ x: x, y: y, w: w, h: h });
}

applyTransform();
loadData();

win.addEventListener("wheel", function(event) {
  event.preventDefault();

  if (event.ctrlKey) {
    scale += event.deltaY * -0.0005;

    if (scale < 0.5) scale = 0.5;
    if (scale > 2) scale = 2;
  } else {
    moveX -= event.deltaX;
    moveY -= event.deltaY;

    let directionX = 0;
    let directionY = 0;

    if (event.deltaX > 0) directionX = 1;
    if (event.deltaX < 0) directionX = -1;
    if (event.deltaY > 0) directionY = 1;
    if (event.deltaY < 0) directionY = -1;

    if (Math.random() < 0.3) {
      makeBubble(directionX, directionY);
    }
  }

  applyTransform();
}, { passive: false });
</script>

</body>
</html>
