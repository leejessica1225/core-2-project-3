<!DOCTYPE html>
<html>
<head>
  <title>Parsons Survival Network</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: white;
      font-family: Arial;
    }

    .window {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      border: 2px solid black;
      position: relative;
    }

    .page {
      position: absolute;
      width: 6000px;
      height: 4000px;
      background: white;
    }

    .title {
      position: fixed;
      top: 30px;
      left: 30px;
      font-size: 26px;
      line-height: 1.2;
      z-index: 10;
    }

    .title span {
      border-bottom: 4px solid black;
    }

    .mode {
      position: fixed;
      top: 45px;
      right: 95px;
      font-size: 26px;
      text-decoration: none;
      color: black;
      z-index: 10;
    }

    .bubble {
      position: absolute;
      background: #d3d3d3;
      border-radius: 50%;
    }

    .photo {
      position: absolute;
      width: 80%;
      height: 65%;
      left: 10%;
      top: 10%;
      border-radius: 50%;
      overflow: hidden;
      background: #aaa;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info {
      position: absolute;
      width: 100%;
      bottom: 14%;
      text-align: center;
      font-size: 15px;
      transform: rotate(15deg);
    }
  </style>
</head>

<body>

<div class="title">
  <span>PARSONS SURVIVAL</span><br>
  <span>NETWORK</span>
</div>

<a href="index2.html" class="mode">offering</a>

<div class="window" id="window">
  <div class="page" id="page"></div>
</div>

<script>
const arenaData = "https://api.are.na/v3/channels/publication-btmpbivan1o/contents?per=100";

async function loadBubbles() {
  const res = await fetch(arenaData);
  const data = await res.json();
  const items = data.data;

  const page = document.getElementById("page");

  let placed = [];

  let sizes = [
    { w: 160, h: 120 },
    { w: 300, h: 220 },
    { w: 480, h: 340 }
  ];

  items.forEach(function(block) {
    let imageURL =
      block?.image?.display?.url ||
      block?.image?.original?.url ||
      block?.image?.thumb?.url ||
      block?.image?.src;

    if (!imageURL) return;

    let size = sizes[Math.floor(Math.random() * sizes.length)];
    let w = size.w;
    let h = size.h;

    let x;
    let y;
    let goodSpot = false;

    for (let tries = 0; tries < 700; tries++) {
      x = 1200 + Math.random() * (3600 - w);
      y = 800 + Math.random() * (2400 - h);

      goodSpot = true;

      for (let i = 0; i < placed.length; i++) {
        let b = placed[i];
        let gap = 20;

        if (
          x < b.x + b.w + gap &&
          x + w + gap > b.x &&
          y < b.y + b.h + gap &&
          y + h + gap > b.y
        ) {
          goodSpot = false;
          break;
        }
      }

      if (goodSpot) break;
    }

    if (!goodSpot) return;

    let bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.style.width = w + "px";
    bubble.style.height = h + "px";
    bubble.style.left = x + "px";
    bubble.style.top = y + "px";

    let photo = document.createElement("div");
    photo.className = "photo";

    let img = document.createElement("img");
    img.src = imageURL;

    let info = document.createElement("div");
    info.className = "info";
    info.innerText = "title / urgency level";

    photo.appendChild(img);
    bubble.appendChild(photo);
    bubble.appendChild(info);
    page.appendChild(bubble);

    placed.push({ x: x, y: y, w: w, h: h });
  });
}

loadBubbles();

let moveX = -2000;
let moveY = -1200;

const page = document.getElementById("page");
const win = document.getElementById("window");

page.style.transform = "translate(" + moveX + "px, " + moveY + "px)";

win.addEventListener("wheel", function(event) {
  event.preventDefault();

  moveX -= event.deltaX;
  moveY -= event.deltaY;

  page.style.transform = "translate(" + moveX + "px, " + moveY + "px)";
}, { passive: false });
</script>

</body>
</html>
