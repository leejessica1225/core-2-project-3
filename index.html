<!DOCTYPE html>
<html>
<head>
  <title>Parsons Survival Network</title>

  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial;
    }

    .page {
      position: relative;
      height: 100vh;
      overflow: hidden;
      border: 2px solid black;
    }

    .title {
      position: absolute;
      top: 30px;
      left: 30px;
      font-size: 26px;
      line-height: 1.2;
      z-index: 10;
    }

    .title span {
      border-bottom: 4px solid black;
    }

    .mode {
      position: absolute;
      top: 45px;
      right: 100px;
      font-size: 26px;
      z-index: 10;
    }

    .bubble-area {
      position: absolute;
      width: 1200px;
      height: 760px;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
    }

    .bubble {
      position: absolute;
      background: #d3d3d3;
      border-radius: 50%;
    }

    .photo {
      position: absolute;
      width: 70%;
      height: 58%;
      left: 15%;
      top: 12%;
      background: #aaa;
      border-radius: 50%;
      overflow: hidden;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info {
      position: absolute;
      width: 100%;
      bottom: 15%;
      text-align: center;
      font-size: 18px;
      transform: rotate(22deg);
    }

    .small {
      width: 90px;
      height: 60px;
    }

    .medium {
      width: 180px;
      height: 130px;
    }

    .large {
      width: 320px;
      height: 240px;
    }
  </style>
</head>

<body>

<div class="page">
  <div class="title">
    <span>PARSONS SURVIVAL</span><br>
    <span>NETWORK</span>
  </div>

  <div class="mode">offering</div>

  <div class="bubble-area" id="bubbleArea"></div>
</div>

<script>
const arenaData = "https://api.are.na/v3/channels/publication-btmpbivan1o/contents?per=12";

let layout = [
  { x: 170, y: 120, size: "large" },
  { x: 520, y: 165, size: "medium" },
  { x: 740, y: 75, size: "large" },

  { x: -70, y: 320, size: "large" },
  { x: 250, y: 405, size: "small" },
  { x: 410, y: 380, size: "large" },

  { x: 735, y: 315, size: "small" },
  { x: 805, y: 420, size: "medium" },
  { x: 170, y: 535, size: "medium" },

  { x: 760, y: 620, size: "small" },
  { x: 925, y: 540, size: "large" },
  { x: 355, y: 690, size: "large" }
];

async function loadBubbles() {
  const res = await fetch(arenaData);
  const data = await res.json();
  const items = data.data;

  const area = document.getElementById("bubbleArea");

  layout.forEach((spot, i) => {
    let block = items[i];
    if (!block) return;

    let imageURL =
      block.image?.display?.url ||
      block.image?.original?.url ||
      block.image?.thumb?.url ||
      block.image?.src;

    let bubble = document.createElement("div");
    bubble.className = "bubble " + spot.size;
    bubble.style.left = spot.x + "px";
    bubble.style.top = spot.y + "px";

    if (spot.size !== "small") {
      let photo = document.createElement("div");
      photo.className = "photo";

      if (imageURL) {
        let img = document.createElement("img");
        img.src = imageURL;
        photo.appendChild(img);
      }

      let info = document.createElement("div");
      info.className = "info";
      info.innerText = "title / urgent level";

      bubble.appendChild(photo);
      bubble.appendChild(info);
    }

    area.appendChild(bubble);
  });
}

loadBubbles();
</script>

</body>
</html>
