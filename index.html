<!DOCTYPE html>
<html>
<head>
  <title>Parsons Survival Network</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: white;
      font-family: Arial;
    }

    .window {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      border: 2px solid black;
      position: relative;
    }

    .page {
      position: absolute;
      width: 8000px;
      height: 6000px;
      transform-origin: 0 0;
    }

    .bubble {
      position: absolute;
      background: #d3d3d3;
      border-radius: 50%;
    }

    .photo {
      position: absolute;
      width: 80%;
      height: 65%;
      left: 10%;
      top: 10%;
      border-radius: 50%;
      overflow: hidden;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<div class="window" id="window">
  <div class="page" id="page"></div>
</div>

<script>
const arenaData = "https://api.are.na/v3/channels/publication-btmpbivan1o/contents?per=100";

let items = [];
let placed = [];

let sizes = [
  { w: 160, h: 120 },
  { w: 300, h: 220 },
  { w: 480, h: 340 }
];

let moveX = -2000;
let moveY = -1200;
let scale = 1;

const page = document.getElementById("page");
const win = document.getElementById("window");

function applyTransform() {
  page.style.transform =
    "translate(" + moveX + "px," + moveY + "px) scale(" + scale + ")";
}

async function loadData() {
  const res = await fetch(arenaData);
  const data = await res.json();
  items = data.data;

  for (let i = 0; i < 20; i++) {
    makeBubble();
  }
}

function makeBubble() {
  if (items.length === 0) return;

  let block = items[Math.floor(Math.random() * items.length)];

  let imageURL =
    block?.image?.display?.url ||
    block?.image?.original?.url ||
    block?.image?.thumb?.url;

  if (!imageURL) return;

  let size = sizes[Math.floor(Math.random() * sizes.length)];
  let w = size.w;
  let h = size.h;

  let x, y, ok;

  for (let tries = 0; tries < 200; tries++) {
    x = 2000 + Math.random() * 3000;
    y = 1500 + Math.random() * 2000;

    ok = true;

    for (let i = 0; i < placed.length; i++) {
      let b = placed[i];
      let gap = 20;

      if (
        x < b.x + b.w + gap &&
        x + w + gap > b.x &&
        y < b.y + b.h + gap &&
        y + h + gap > b.y
      ) {
        ok = false;
        break;
      }
    }

    if (ok) break;
  }

  if (!ok) return;

  let bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.style.width = w + "px";
  bubble.style.height = h + "px";
  bubble.style.left = x + "px";
  bubble.style.top = y + "px";

  let photo = document.createElement("div");
  photo.className = "photo";

  let img = document.createElement("img");
  img.src = imageURL;

  photo.appendChild(img);
  bubble.appendChild(photo);
  page.appendChild(bubble);

  placed.push({ x, y, w, h });
}

applyTransform();

win.addEventListener("wheel", function(e) {
  e.preventDefault();

  if (e.ctrlKey) {
    scale += e.deltaY * -0.001;
    if (scale < 0.5) scale = 0.5;
    if (scale > 2) scale = 2;
  } else {
    moveX -= e.deltaX;
    moveY -= e.deltaY;

    for (let i = 0; i < 2; i++) {
      makeBubble();
    }
  }

  applyTransform();
}, { passive: false });

loadData();
</script>

</body>
</html>
