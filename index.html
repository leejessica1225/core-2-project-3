<!DOCTYPE html>
<html>
<head>
  <title>Parsons Survival Network</title>

  <style>
    body {
      margin: 0;
      background: #eee;
      font-family: Arial;
    }

    .page {
      position: relative;
      height: 100vh;
      overflow: hidden;
      border: 2px solid black;
    }

    .title {
      position: absolute;
      top: 30px;
      left: 30px;
      font-size: 26px;
      line-height: 1.2;
      z-index: 10;
    }

    .title span {
      border-bottom: 4px solid black;
    }

    .mode {
      position: absolute;
      top: 40px;
      right: 100px;
      font-size: 16px;
      z-index: 10;
    }

    .bubble {
      position: absolute;
      background: #d3d3d3;
      border-radius: 50%;
    }

    .photo {
      position: absolute;
      width: 70%;
      height: 50%;
      left: 15%;
      top: 16%;
      background: #aaa;
      border-radius: 50%;
    }

    .info {
      position: absolute;
      width: 100%;
      bottom: 18%;
      text-align: center;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <div class="page" id="page">
    <div class="title">
      <span>PARSONS SURVIVAL</span><br>
      <span>NETWORK</span>
    </div>

    <div class="mode">offering</div>
  </div>

  <script>
    let page = document.getElementById("page");
    let bubbles = [];

    for (let i = 0; i < 8; i++) {
      let width = Math.random() * 180 + 220;
      let height = width * 0.75;

      let x;
      let y;
      let clear;

      do {
        clear = true;

        x = Math.random() * (window.innerWidth - width);
        y = Math.random() * (window.innerHeight - height);

        for (let j = 0; j < bubbles.length; j++) {
          let b = bubbles[j];

          let overlap =
            x < b.x + b.width + 20 &&
            x + width + 20 > b.x &&
            y < b.y + b.height + 20 &&
            y + height + 20 > b.y;

          if (overlap) {
            clear = false;
          }
        }
      } while (!clear);

      let bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.style.width = width + "px";
      bubble.style.height = height + "px";
      bubble.style.left = x + "px";
      bubble.style.top = y + "px";

      let photo = document.createElement("div");
      photo.className = "photo";

      let info = document.createElement("div");
      info.className = "info";
      info.innerText = "title / urgent level";

      bubble.appendChild(photo);
      bubble.appendChild(info);
      page.appendChild(bubble);

      bubbles.push({
        x: x,
        y: y,
        width: width,
        height: height
      });
    }
  </script>
</body>
</html>
