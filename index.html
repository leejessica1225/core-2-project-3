<!DOCTYPE html>
<html>
<head>
  <title>Parsons Survival Network</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: white;
      font-family: Arial;
    }

    .title {
      position: fixed;
      top: 30px;
      left: 30px;
      font-size: 26px;
      line-height: 1.4;
      z-index: 10;
      cursor: pointer;
    }

    .title span {
      display: inline-block;
      position: relative;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
    }

    .title span::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: black;
    }

    .mode {
      position: fixed;
      top: 30px;
      right: 30px;
      font-size: 18px;
      text-decoration: none;
      color: black;
      z-index: 10;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -370px;
      width: 370px;
      height: 100vh;
      background: black;
      color: white;
      padding: 35px 30px;
      box-sizing: border-box;
      z-index: 50;
      transition: left 0.3s;
    }

    .menu-title {
      font-size: 26px;
      line-height: 1.4;
      cursor: pointer;
    }

    .menu-title span {
      display: inline-block;
      position: relative;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
    }

    .menu-title span::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: white;
    }

    .menu-item {
      margin-top: 80px;
      font-size: 18px;
      color: white;
      text-decoration: none;
      display: block;
    }

    .window {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      border: 2px solid black;
      position: relative;
    }

    .page {
      position: absolute;
      width: 12000px;
      height: 9000px;
      transform-origin: 0 0;
      transition: transform 0.08s ease-out;
    }

    .bubble {
      position: absolute;
      background: #d3d3d3;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .bubble:hover {
      background: #eeeeee;
    }

    .photo {
      position: absolute;
      width: 80%;
      height: 65%;
      left: 10%;
      top: 10%;
      border-radius: 50%;
      overflow: hidden;
      background: #aaa;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .curveText {
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      pointer-events: none;
      overflow: visible;
    }

    .curveText text {
      fill: black;
      font-family: Arial;
    }
  </style>
</head>

<body onclick="closeMenu()">

<div class="title" onclick="toggleMenu(event)">
  <span>PARSONS SURVIVAL</span><br>
  <span>NETWORK</span>
</div>

<div class="sidebar" id="sidebar" onclick="event.stopPropagation()">
  <div class="menu-title" onclick="toggleMenu(event)">
    <span>PARSONS SURVIVAL</span><br>
    <span>NETWORK</span>
  </div>

  <a href="create.html" class="menu-item">create a post</a>
</div>

<a href="index2.html" class="mode">offering</a>

<div class="window" id="window">
  <div class="page" id="page"></div>
</div>

<script>
function toggleMenu(event) {
  event.stopPropagation();

  var sidebar = document.getElementById("sidebar");

  if (sidebar.style.left === "0px") {
    sidebar.style.left = "-370px";
  } else {
    sidebar.style.left = "0px";
  }
}

function closeMenu() {
  document.getElementById("sidebar").style.left = "-370px";
}

const arenaData = "https://api.are.na/v2/channels/publication-btmpbivan1o/contents?per=50";

let items = [];
let placed = [];

let sizes = [
  { w: 160, h: 120 },
  { w: 300, h: 220 },
  { w: 480, h: 340 }
];

let moveX = -4500;
let moveY = -3200;
let scale = 1;

const page = document.getElementById("page");
const win = document.getElementById("window");

function applyTransform() {
  page.style.transform =
    "translate(" + moveX + "px, " + moveY + "px) scale(" + scale + ")";
}

async function loadData() {
  try {
    const res = await fetch(arenaData);
    const data = await res.json();
    items = data.contents;
  } catch {
    items = [];
  }

  for (let i = 0; i < 18; i++) {
    makeBubble(0, 0);
  }
}

function makeCurveText(bubble, w, h, block) {
  let svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.classList.add("curveText");
  svg.setAttribute("viewBox", "0 0 " + w + " " + h);

  let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  let curveId = "curve" + placed.length + Math.floor(Math.random() * 10000);

  path.setAttribute("id", curveId);
  path.setAttribute("fill", "none");

  if (w === 160) {
    path.setAttribute("d", "M 0 0 C 0 7.87931 2.06926 15.6815 6.08964 22.961 C 10.11 30.2405 16.0028 36.8549 23.4315 42.4264 C 30.8601 47.9979 39.6793 52.4175 49.3853 55.4328 C 59.0914 58.4481 69.4942 60 80 60 C 90.5057 60 100.909 58.4481 110.615 55.4328 C 120.321 52.4175 129.14 47.9979 136.569 42.4264 C 143.997 36.8549 149.89 30.2405 153.91 22.961 C 157.931 15.6815 160 7.87931 160 0");
  } else if (w === 300) {
    path.setAttribute("d", "M 0 0 C 0 14.4454 3.87986 28.7494 11.4181 42.0952 C 18.9563 55.441 30.0052 67.5673 43.934 77.7817 C 57.8628 87.9962 74.3986 96.0987 92.5975 101.627 C 110.796 107.155 130.302 110 150 110 C 169.698 110 189.204 107.155 207.403 101.627 C 225.601 96.0987 242.137 87.9962 256.066 77.7817 C 269.995 67.5673 281.044 55.441 288.582 42.0952 C 296.12 28.7494 300 14.4454 300 0");
  } else {
    path.setAttribute("d", "M 0 0 C 0 45.0868 25.2857 88.327 70.2944 120.208 C 115.303 152.089 176.348 170 240 170 C 303.652 170 364.697 152.089 409.706 120.208 C 454.714 88.327 480 45.0868 480 0");
  }

  let text = document.createElementNS("http://www.w3.org/2000/svg", "text");

  if (w === 160) {
    text.setAttribute("font-size", "12");
  } else if (w === 300) {
    text.setAttribute("font-size", "20");
  } else {
    text.setAttribute("font-size", "34");
  }

  let textPath = document.createElementNS("http://www.w3.org/2000/svg", "textPath");
  textPath.setAttribute("href", "#" + curveId);
  textPath.setAttribute("startOffset", "38%");
  textPath.setAttribute("text-anchor", "middle");

  let titleText = block.title || "title";
  let urgencyText = "urgency level";

  textPath.textContent = titleText + " / " + urgencyText;

  text.appendChild(textPath);
  svg.appendChild(path);
  svg.appendChild(text);
  bubble.appendChild(svg);
}

function makeBubble(directionX, directionY) {
  if (items.length === 0) return;

  let block = items[Math.floor(Math.random() * items.length)];

  let imageURL =
    block.image?.display?.url ||
    block.image?.large?.url ||
    block.image?.original?.url ||
    block.image?.thumb?.url;

  if (!imageURL) return;

  let size = sizes[Math.floor(Math.random() * sizes.length)];
  let w = size.w;
  let h = size.h;

  let viewX = -moveX + window.innerWidth / 2;
  let viewY = -moveY + window.innerHeight / 2;

  let x, y, ok = false;

  for (let tries = 0; tries < 300; tries++) {
    if (directionX > 0) {
      x = viewX + 700 + Math.random() * 1200;
    } else if (directionX < 0) {
      x = viewX - 1900 + Math.random() * 1200;
    } else {
      x = viewX - 900 + Math.random() * 1800;
    }

    if (directionY > 0) {
      y = viewY + 500 + Math.random() * 1000;
    } else if (directionY < 0) {
      y = viewY - 1500 + Math.random() * 1000;
    } else {
      y = viewY - 700 + Math.random() * 1400;
    }

    ok = true;

    for (let i = 0; i < placed.length; i++) {
      let b = placed[i];
      let gap = 50;

      if (
        x < b.x + b.w + gap &&
        x + w + gap > b.x &&
        y < b.y + b.h + gap &&
        y + h + gap > b.y
      ) {
        ok = false;
        break;
      }
    }

    if (ok) break;
  }

  if (!ok) return;

  let bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.style.width = w + "px";
  bubble.style.height = h + "px";
  bubble.style.left = x + "px";
  bubble.style.top = y + "px";

  let photo = document.createElement("div");
  photo.className = "photo";

  let img = document.createElement("img");
  img.src = imageURL;

  photo.appendChild(img);
  bubble.appendChild(photo);

  makeCurveText(bubble, w, h, block);

  page.appendChild(bubble);

  placed.push({ x: x, y: y, w: w, h: h });
}

applyTransform();
loadData();

win.addEventListener("wheel", function(event) {
  event.preventDefault();

  if (event.ctrlKey) {
    let oldScale = scale;

    scale += event.deltaY * -0.002;

    if (scale < 0.5) scale = 0.5;
    if (scale > 2) scale = 2;

    let mouseX = event.clientX;
    let mouseY = event.clientY;

    moveX = mouseX - (mouseX - moveX) * (scale / oldScale);
    moveY = mouseY - (mouseY - moveY) * (scale / oldScale);
  } else {
    moveX -= event.deltaX;
    moveY -= event.deltaY;

    let directionX = 0;
    let directionY = 0;

    if (event.deltaX > 0) directionX = 1;
    if (event.deltaX < 0) directionX = -1;
    if (event.deltaY > 0) directionY = 1;
    if (event.deltaY < 0) directionY = -1;

    if (Math.random() < 0.3) {
      makeBubble(directionX, directionY);
    }
  }

  applyTransform();
}, { passive: false });
</script>

</body>
</html>
