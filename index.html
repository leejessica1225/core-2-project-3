<!DOCTYPE html>
<html>
<head>
  <title>Parsons Survival Network</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: white;
      font-family: Arial;
    }

    .title {
      position: fixed;
      top: 30px;
      left: 30px;
      font-size: 26px;
      line-height: 1.4;
      z-index: 10;
      cursor: pointer;
    }

    .title span {
      display: inline-block;
      position: relative;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
    }

    .title span::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: black;
    }

    .mode {
      position: fixed;
      top: 30px;
      right: 30px;
      font-size: 18px;
      text-decoration: none;
      color: black;
      z-index: 10;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -370px;
      width: 370px;
      height: 100vh;
      background: black;
      color: white;
      padding: 35px 30px;
      box-sizing: border-box;
      z-index: 50;
      transition: left 0.3s;
    }

    .menu-title {
      font-size: 26px;
      line-height: 1.4;
    }

    .menu-title span {
      display: inline-block;
      position: relative;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
    }

    .menu-title span::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: white;
    }

    .menu-item {
      margin-top: 80px;
      font-size: 18px;
      color: white;
      text-decoration: none;
      display: block;
    }

    .window {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      border: 2px solid black;
      position: relative;
    }

    .page {
      position: absolute;
      width: 12000px;
      height: 9000px;
      transform-origin: 50vw 50vh;
      transition: transform 0.12s;
    }

    .bubble {
      position: absolute;
      background: #d3d3d3;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .bubble:hover {
      background: #eeeeee;
    }

    .photo {
      position: absolute;
      width: 80%;
      height: 65%;
      left: 10%;
      top: 10%;
      border-radius: 50%;
      overflow: hidden;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info {
      position: absolute;
      width: 100%;
      bottom: 14%;
      text-align: center;
      font-size: 15px;
      transform: rotate(15deg);
    }
  </style>
</head>

<body onclick="closeMenu()">

<div class="title" onclick="toggleMenu(event)">
  <span>PARSONS SURVIVAL</span><br>
  <span>NETWORK</span>
</div>

<div class="sidebar" id="sidebar" onclick="event.stopPropagation()">
  <div class="menu-title" onclick="toggleMenu(event)">
    <span>PARSONS SURVIVAL</span><br>
    <span>NETWORK</span>
  </div>

  <a href="create.html" class="menu-item">create a post</a>
</div>

<a href="index2.html" class="mode">offering</a>

<div class="window" id="window">
  <div class="page" id="page"></div>
</div>

<script>
function toggleMenu(event) {
  event.stopPropagation();
  var sidebar = document.getElementById("sidebar");

  if (sidebar.style.left === "0px") {
    sidebar.style.left = "-370px";
  } else {
    sidebar.style.left = "0px";
  }
}

function closeMenu() {
  var sidebar = document.getElementById("sidebar");
  sidebar.style.left = "-370px";
}

/* --- 기존 bubble 코드 그대로 유지 --- */

const arenaData = "https://api.are.na/v2/channels/publication-btmpbivan1o/contents?per=50";

let items = [];
let placed = [];

let sizes = [
  { w: 160, h: 120 },
  { w: 300, h: 220 },
  { w: 480, h: 340 }
];

let moveX = -4500;
let moveY = -3200;
let scale = 1;

const page = document.getElementById("page");
const win = document.getElementById("window");

function applyTransform() {
  page.style.transform =
    "translate(" + moveX + "px, " + moveY + "px) scale(" + scale + ")";
}

async function loadData() {
  try {
    const res = await fetch(arenaData);
    const data = await res.json();
    items = data.contents;
  } catch {
    items = [];
  }

  for (let i = 0; i < 15; i++) {
    makeBubble();
  }
}

function makeBubble() {
  if (items.length === 0) return;

  let block = items[Math.floor(Math.random() * items.length)];

  let imageURL =
    block.image?.display?.url ||
    block.image?.large?.url ||
    block.image?.original?.url ||
    block.image?.thumb?.url;

  if (!imageURL) return;

  let size = sizes[Math.floor(Math.random() * sizes.length)];
  let w = size.w;
  let h = size.h;

  let x = Math.random() * 10000;
  let y = Math.random() * 8000;

  let bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.style.width = w + "px";
  bubble.style.height = h + "px";
  bubble.style.left = x + "px";
  bubble.style.top = y + "px";

  let photo = document.createElement("div");
  photo.className = "photo";

  let img = document.createElement("img");
  img.src = imageURL;

  let info = document.createElement("div");
  info.className = "info";
  info.innerText = "title / urgency level";

  photo.appendChild(img);
  bubble.appendChild(photo);
  bubble.appendChild(info);
  page.appendChild(bubble);
}

applyTransform();
loadData();

win.addEventListener("wheel", function(event) {
  event.preventDefault();

  if (event.ctrlKey) {
    scale += event.deltaY * -0.0005;
  } else {
    moveX -= event.deltaX;
    moveY -= event.deltaY;
  }

  page.style.transform =
    "translate(" + moveX + "px, " + moveY + "px) scale(" + scale + ")";
});
</script>

</body>
</html>
