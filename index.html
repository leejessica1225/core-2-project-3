<!DOCTYPE html>
<html>
<head>
  <title>Parsons Survival Network</title>

  <style>
    body {
      margin: 0;
      background: #eee;
      font-family: Arial;
    }

    .page {
      position: relative;
      height: 100vh;
      overflow: hidden;
      border: 2px solid black;
    }

    .title {
      position: absolute;
      top: 30px;
      left: 30px;
      font-size: 26px;
      line-height: 1.2;
      z-index: 10;
    }

    .title span {
      border-bottom: 4px solid black;
    }

    .mode {
      position: absolute;
      top: 40px;
      right: 100px;
      font-size: 16px;
      z-index: 10;
    }

    .bubble {
      position: absolute;
      background: #d3d3d3;
      border-radius: 50%;
    }

    .photo {
      position: absolute;
      width: 80%;
      height: 65%;
      left: 10%;
      top: 10%;
      background: #aaa;
      border-radius: 50%;
      overflow: hidden;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info {
      position: absolute;
      width: 100%;
      bottom: 12%;
      text-align: center;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="page" id="page">
    <div class="title">
      <span>PARSONS SURVIVAL</span><br>
      <span>NETWORK</span>
    </div>

    <div class="mode">offering</div>
  </div>

  <script>
    const arenaData = "https://api.are.na/v3/channels/publication-btmpbivan1o/contents?per=20";

    async function loadBubbles() {
      const res = await fetch(arenaData);
      const data = await res.json();
      const items = data.data;

      const page = document.getElementById("page");
      let placed = [];

      items.forEach(block => {
        let imageURL =
          block.image?.display?.url ||
          block.image?.original?.url ||
          block.image?.thumb?.url ||
          block.image?.src;

        if (!imageURL) return;

        let sizes = [
          { w: 200, h: 150 },
          { w: 300, h: 220 },
          { w: 420, h: 300 }
        ];

        let pick = sizes[Math.floor(Math.random() * 3)];
        let w = pick.w;
        let h = pick.h;

        let x, y, ok;
        let tries = 0;

        do {
          ok = true;

          x = Math.random() * (window.innerWidth - w);
          y = Math.random() * (window.innerHeight - h);

          for (let i = 0; i < placed.length; i++) {
            let b = placed[i];

            let overlap =
              x < b.x + b.w + 20 &&
              x + w + 20 > b.x &&
              y < b.y + b.h + 20 &&
              y + h + 20 > b.y;

            if (overlap) {
              ok = false;
              break;
            }
          }

          tries++;
          if (tries > 100) return;

        } while (!ok);

        let bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.style.width = w + "px";
        bubble.style.height = h + "px";
        bubble.style.left = x + "px";
        bubble.style.top = y + "px";

        let photo = document.createElement("div");
        photo.className = "photo";

        let img = document.createElement("img");
        img.src = imageURL;

        let info = document.createElement("div");
        info.className = "info";
        info.innerText = "title / urgency level";

        photo.appendChild(img);
        bubble.appendChild(photo);
        bubble.appendChild(info);
        page.appendChild(bubble);

        placed.push({ x: x, y: y, w: w, h: h });
      });
    }

    loadBubbles();
  </script>

</body>
</html>
