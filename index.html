<!DOCTYPE html>
<html>
<head>
  <title>Parsons Survival Network</title>

  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial;
    }

    .page {
      position: relative;
      height: 100vh;
      overflow: hidden;
      border: 2px solid black;
    }

    .title {
      position: absolute;
      top: 30px;
      left: 30px;
      font-size: 26px;
      line-height: 1.2;
      z-index: 10;
    }

    .title span {
      border-bottom: 4px solid black;
    }

    .mode {
      position: absolute;
      top: 45px;
      right: 100px;
      font-size: 26px;
      z-index: 10;
    }

    .bubble {
      position: absolute;
      background: #d3d3d3;
      border-radius: 50%;
    }

    .photo {
      position: absolute;
      width: 70%;
      height: 58%;
      left: 15%;
      top: 12%;
      border-radius: 50%;
      overflow: hidden;
      background: #aaa;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info {
      position: absolute;
      width: 100%;
      bottom: 15%;
      text-align: center;
      font-size: 18px;
      transform: rotate(22deg);
    }

    .small { width: 90px; height: 60px; }
    .medium { width: 180px; height: 130px; }
    .large { width: 320px; height: 240px; }
  </style>
</head>

<body>

<div class="page" id="page">
  <div class="title">
    <span>PARSONS SURVIVAL</span><br>
    <span>NETWORK</span>
  </div>
  <div class="mode">offering</div>
</div>

<script>
const arenaData = "https://api.are.na/v3/channels/publication-btmpbivan1o/contents?per=12";

let layout = [
  { x: 170, y: 165, size: "large" },
  { x: 525, y: 208, size: "medium" },
  { x: 740, y: 120, size: "large" },
  { x: -110, y: 365, size: "large" },
  { x: 252, y: 455, size: "small" },
  { x: 402, y: 420, size: "large" },
  { x: 740, y: 360, size: "small" },
  { x: 800, y: 460, size: "medium" },
  { x: 172, y: 568, size: "medium" },
  { x: 760, y: 668, size: "small" },
  { x: 925, y: 580, size: "large" },
  { x: 355, y: 742, size: "large" }
];

function getSize(size){
  if(size==="small") return {w:90,h:60};
  if(size==="medium") return {w:180,h:130};
  return {w:320,h:240};
}

async function loadBubbles(){
  const res = await fetch(arenaData);
  const data = await res.json();
  const items = data.data;

  const page = document.getElementById("page");

  let minX = Infinity;
  let maxX = -Infinity;

  layout.forEach(l=>{
    let s = getSize(l.size);
    minX = Math.min(minX, l.x);
    maxX = Math.max(maxX, l.x + s.w);
  });

  let layoutWidth = maxX - minX;
  let shiftX = (page.clientWidth - layoutWidth)/2 - minX;

  layout.forEach((spot,i)=>{
    let block = items[i];
    if(!block) return;

    let imageURL =
      block.image?.display?.url ||
      block.image?.original?.url ||
      block.image?.thumb?.url ||
      block.image?.src;

    let bubble = document.createElement("div");
    bubble.className = "bubble " + spot.size;
    bubble.style.left = (spot.x + shiftX) + "px";
    bubble.style.top = spot.y + "px";

    if(spot.size !== "small"){
      let photo = document.createElement("div");
      photo.className = "photo";

      if(imageURL){
        let img = document.createElement("img");
        img.src = imageURL;
        photo.appendChild(img);
      }

      let info = document.createElement("div");
      info.className = "info";
      info.innerText = "title / urgent level";

      bubble.appendChild(photo);
      bubble.appendChild(info);
    }

    page.appendChild(bubble);
  });
}

loadBubbles();
</script>

</body>
</html>
