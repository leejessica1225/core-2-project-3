<!DOCTYPE html>
<html>
<head>
  <title>Parsons Survival Network</title>

  <style>
    body {
      margin: 0;
      background: #eee;
      font-family: Arial;
    }

    .page {
      position: relative;
      height: 100vh;
      overflow: hidden;
      border: 2px solid black;
    }

    .title {
      position: absolute;
      top: 30px;
      left: 30px;
      font-size: 26px;
      line-height: 1.2;
      z-index: 10;
    }

    .title span {
      border-bottom: 4px solid black;
    }

    .mode {
      position: absolute;
      top: 40px;
      right: 100px;
      font-size: 16px;
      z-index: 10;
    }

    .bubble {
      position: absolute;
      width: 300px;
      height: 230px;
      background: #d3d3d3;
      border-radius: 50%;
    }

    .photo {
      position: absolute;
      width: 70%;
      height: 55%;
      left: 15%;
      top: 15%;
      background: #aaa;
      border-radius: 50%;
    }

    .info {
      position: absolute;
      left: 50px;
      bottom: 35px;
      font-size: 22px;
      transform: rotate(35deg);
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="title">
      <span>PARSONS SURVIVAL</span><br>
      <span>NETWORK</span>
    </div>

    <div class="mode">offering</div>

    <div class="bubble" style="left:120px; top:120px;">
      <div class="photo"></div>
      <div class="info">title / urgent level</div>
    </div>

    <div class="bubble" style="left:520px; top:180px;">
      <div class="photo"></div>
      <div class="info">title / urgent level</div>
    </div>

    <div class="bubble" style="left:250px; top:480px;">
      <div class="photo"></div>
      <div class="info">title / urgent level</div>
    </div>
  </div>
</body>
</html>
