<!DOCTYPE html>
<html>
<head>
<title>Parsons Survival Network</title>

<style>
body{
  margin:0;
  background:#eee;
  font-family:Arial;
}

.page{
  position:relative;
  height:100vh;
  overflow:hidden;
  border:2px solid #000;
}

.title{
  position:absolute;
  top:30px;
  left:30px;
  font-size:26px;
  line-height:1.2;
  z-index:10;
}

.title span{
  border-bottom:4px solid #000;
}

.mode{
  position:absolute;
  top:40px;
  right:100px;
  font-size:16px;
  z-index:10;
}

.b{
  position:absolute;
  background:#d3d3d3;
  border-radius:50%;
}
</style>
</head>

<body>

<div class="page" id="page">
  <div class="title">
    <span>PARSONS SURVIVAL</span><br>
    <span>NETWORK</span>
  </div>

  <div class="mode">offering</div>
</div>

<script>
let page = document.getElementById("page");
let list = [];

for(let i=0;i<20;i++){

  let b = document.createElement("div");
  b.className = "b";

  let size = Math.random()*150 + 80;
  let x, y, ok;

  do{
    ok = true;

    x = Math.random()*(window.innerWidth - size);
    y = Math.random()*(window.innerHeight - size);

    for(let j=0;j<list.length;j++){
      let dx = x - list[j].x;
      let dy = y - list[j].y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < size/2 + list[j].size/2 + 10){
        ok = false;
        break;
      }
    }

  }while(!ok);

  b.style.width = size + "px";
  b.style.height = size + "px";
  b.style.left = x + "px";
  b.style.top = y + "px";

  page.appendChild(b);

  list.push({x:x, y:y, size:size});
}
</script>

</body>
</html>
