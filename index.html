<!DOCTYPE html>
<html>
<head>
  <title>Parsons Survival Network</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: white;
      font-family: Arial;
    }

    .title {
      position: fixed;
      top: 30px;
      left: 30px;
      font-size: 26px;
      cursor: pointer;
      z-index: 10;
    }

    .mode {
      position: fixed;
      top: 30px;
      right: 30px;
      font-size: 18px;
      z-index: 10;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -300px;
      width: 300px;
      height: 100%;
      background: black;
      color: white;
      padding: 30px;
      transition: 0.3s;
      z-index: 20;
    }

    .menu-item {
      margin-top: 40px;
      font-size: 18px;
    }

    .window {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .page {
      position: absolute;
      width: 10000px;
      height: 8000px;
      transform-origin: 0 0;
    }

    .bubble {
      position: absolute;
      background: #d9d9d9;
      border-radius: 50%;
    }

    .photo {
      position: absolute;
      width: 80%;
      height: 60%;
      left: 10%;
      top: 10%;
      border-radius: 50%;
      overflow: hidden;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    svg {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

  </style>
</head>

<body onclick="closeMenu()">

<div class="title" onclick="toggleMenu(event)">
  PARSONS SURVIVAL<br>NETWORK
</div>

<div class="sidebar" id="sidebar" onclick="event.stopPropagation()">
  <div onclick="toggleMenu(event)">PARSONS<br>NETWORK</div>
  <div class="menu-item">create a post</div>
</div>

<div class="mode">offering</div>

<div class="window" id="window">
  <div class="page" id="page"></div>
</div>

<script>

function toggleMenu(e){
  e.stopPropagation();
  let s = document.getElementById("sidebar");
  s.style.left = (s.style.left === "0px") ? "-300px" : "0px";
}

function closeMenu(){
  document.getElementById("sidebar").style.left = "-300px";
}

let page = document.getElementById("page");

let sizes = [
  {w:160, h:120},
  {w:300, h:220},
  {w:480, h:340}
];

let moveX = -4000;
let moveY = -3000;
let scale = 1;

function applyTransform(){
  page.style.transform = `translate(${moveX}px, ${moveY}px) scale(${scale})`;
}

function makeBubble(){
  let size = sizes[Math.floor(Math.random()*3)];
  let w = size.w;
  let h = size.h;

  let bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.style.width = w+"px";
  bubble.style.height = h+"px";
  bubble.style.left = Math.random()*9000+"px";
  bubble.style.top = Math.random()*7000+"px";

  let photo = document.createElement("div");
  photo.className = "photo";

  let img = document.createElement("img");
  img.src = "https://picsum.photos/300";

  photo.appendChild(img);
  bubble.appendChild(photo);

  // 🔥 SVG 곡선 텍스트
  let svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox", `0 0 ${w} ${h}`);

  let path = document.createElementNS("http://www.w3.org/2000/svg","path");

  let id = "curve"+Math.random();

  if(w===480){
    path.setAttribute("d","M 0 0 C 0 45 25 88 70 120 C 115 152 176 170 240 170 C 303 170 364 152 409 120 C 454 88 480 45 480 0");
  }
  if(w===300){
    path.setAttribute("d","M 0 0 C 0 30 20 60 45 80 C 80 110 120 120 150 120 C 180 120 220 110 255 80 C 280 60 300 30 300 0");
  }
  if(w===160){
    path.setAttribute("d","M 0 0 C 0 20 15 40 30 55 C 60 80 100 80 130 55 C 145 40 160 20 160 0");
  }

  path.setAttribute("id",id);
  path.setAttribute("fill","none");

  let text = document.createElementNS("http://www.w3.org/2000/svg","text");

  if(w===160) text.setAttribute("font-size","12");
  if(w===300) text.setAttribute("font-size","20");
  if(w===480) text.setAttribute("font-size","34");

  let textPath = document.createElementNS("http://www.w3.org/2000/svg","textPath");

  textPath.setAttribute("href","#"+id);
  textPath.setAttribute("startOffset","30%");
  textPath.setAttribute("text-anchor","middle");

  textPath.textContent = "title / urgency level";

  text.appendChild(textPath);
  svg.appendChild(path);
  svg.appendChild(text);

  bubble.appendChild(svg);
  page.appendChild(bubble);
}

for(let i=0;i<20;i++) makeBubble();

applyTransform();

window.addEventListener("wheel", function(e){
  e.preventDefault();

  if(e.ctrlKey){
    let old = scale;
    scale += e.deltaY * -0.002;

    let mx = e.clientX;
    let my = e.clientY;

    moveX = mx - (mx - moveX)*(scale/old);
    moveY = my - (my - moveY)*(scale/old);
  } else {
    moveX -= e.deltaX;
    moveY -= e.deltaY;
  }

  applyTransform();
},{passive:false});

</script>

</body>
</html>
