<!DOCTYPE html>
<html>
<head>
  <title>Parsons Survival Network</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      background: white;
      font-family: Arial;
    }

    .window {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      border: 2px solid black;
      box-sizing: border-box;
      position: relative;
    }

    .page {
      position: absolute;
      width: 3000px;
      height: 2000px;
      background: white;
      left: 0;
      top: 0;
    }

    .title {
      position: fixed;
      top: 30px;
      left: 30px;
      font-size: 26px;
      line-height: 1.2;
      z-index: 10;
    }

    .title span {
      border-bottom: 4px solid black;
    }

    .mode {
      position: fixed;
      top: 45px;
      right: 95px;
      font-size: 26px;
      z-index: 10;
      text-decoration: none;
      color: black;
    }

    .bubble {
      position: absolute;
      background: #d3d3d3;
      border-radius: 50%;
    }

    .photo {
      position: absolute;
      width: 80%;
      height: 65%;
      left: 10%;
      top: 10%;
      border-radius: 50%;
      overflow: hidden;
      background: #aaa;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info {
      position: absolute;
      width: 100%;
      bottom: 14%;
      text-align: center;
      font-size: 15px;
      transform: rotate(15deg);
    }
  </style>
</head>

<body>

<div class="title">
  <span>PARSONS SURVIVAL</span><br>
  <span>NETWORK</span>
</div>

<a href="index2.html" class="mode">offering</a>

<div class="window" id="window">
  <div class="page" id="page"></div>
</div>

<script>
const arenaData = "https://api.are.na/v3/channels/publication-btmpbivan1o/contents?per=20";

async function loadBubbles() {
  const res = await fetch(arenaData);
  const data = await res.json();
  const items = data.data;

  const page = document.getElementById("page");

  let positions = [
    { x: 750, y: 450, w: 330, h: 220 },
    { x: 1130, y: 390, w: 190, h: 130 },
    { x: 1430, y: 360, w: 330, h: 220 },

    { x: 650, y: 700, w: 190, h: 130 },
    { x: 940, y: 610, w: 330, h: 220 },
    { x: 1340, y: 620, w: 190, h: 130 },
    { x: 1560, y: 610, w: 330, h: 220 },

    { x: 800, y: 950, w: 190, h: 130 },
    { x: 1180, y: 920, w: 330, h: 220 },
    { x: 1590, y: 970, w: 190, h: 130 },

    { x: 1900, y: 840, w: 330, h: 220 },
    { x: 550, y: 1080, w: 330, h: 220 }
  ];

  positions.forEach((pos, i) => {
    let block = items[i];

    let imageURL =
      block?.image?.display?.url ||
      block?.image?.original?.url ||
      block?.image?.thumb?.url ||
      block?.image?.src;

    if (!imageURL) return;

    let bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.style.width = pos.w + "px";
    bubble.style.height = pos.h + "px";
    bubble.style.left = pos.x + "px";
    bubble.style.top = pos.y + "px";

    let photo = document.createElement("div");
    photo.className = "photo";

    let img = document.createElement("img");
    img.src = imageURL;

    let info = document.createElement("div");
    info.className = "info";
    info.innerText = "title / urgency level";

    photo.appendChild(img);
    bubble.appendChild(photo);
    bubble.appendChild(info);
    page.appendChild(bubble);
  });
}

loadBubbles();

let moveX = -600;
let moveY = -350;

const page = document.getElementById("page");
const win = document.getElementById("window");

page.style.transform = "translate(" + moveX + "px, " + moveY + "px)";

win.addEventListener("wheel", function(event) {
  event.preventDefault();

  moveX = moveX - event.deltaX;
  moveY = moveY - event.deltaY;

  page.style.transform = "translate(" + moveX + "px, " + moveY + "px)";
}, { passive: false });
</script>

</body>
</html>
